<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primary Resources</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1c1c3a; /* Rich black-blue background */
            color: #e6e6f7; /* Soft lavender text */
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            background: linear-gradient(90deg, #6a5acd, #4c4c8e); /* Gradient header */
            padding: 20px;
            color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }
        header h1 {
            font-size: 2.5em;
            margin: 10px 0;
        }
        main {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: #2a2a4d; /* Deep purple-blue card */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        #resource-list h2 {
            color: #a786ff; /* Light purple for section titles */
            border-bottom: 2px solid #6a5acd; /* Lavender border */
            padding-bottom: 5px;
            margin-top: 30px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        a {
            text-decoration: none;
            color: #87ceeb; /* Soft blue links */
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
            color: #b3d9ff; /* Brighter blue on hover */
        }
        footer {
            text-align: center;
            background: #2a2a4d; /* Matches the main card background */
            color: white;
            padding: 15px 0;
            margin-top: 40px;
            box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.5);
        }
        footer a {
            color: #87ceeb;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Primary (پرائمری) Resources</h1>
    </header>
    <main>
        <section id="resource-list">
            <h2>Math (ریاضی)</h2>
            <ul>
                <li><a href="https://www.khanacademy.org/math/early-math" target="_blank">Khan Academy</a></li>
                <li><a href="https://www.ixl.com/math/" target="_blank">IXL Math</a></li>
                <li><a href="https://www.splashlearn.com/" target="_blank">SplashLearn</a></li>
            </ul>
            <h2>English (انگریزی)</h2>
            <ul>
                <li><a href="https://www.readingrockets.org/" target="_blank">Reading Rockets</a></li>
                <li><a href="https://www.storynory.com/" target="_blank">Storynory</a></li>
                <li><a href="https://www.oxfordowl.co.uk/" target="_blank">Oxford Owl</a></li>
            </ul>
            <h2>Computer Science (کمپیوٹر سائنس)</h2>
            <ul>
                <li><a href="https://code.org/" target="_blank">Code.org</a></li>
                <li><a href="https://scratch.mit.edu/" target="_blank">Scratch</a></li>
                <li><a href="https://www.tynker.com/" target="_blank">Tynker</a></li>
            </ul>
        </section>
    </main>
    <footer>
        <p><a href="index.html">Back to Homepage</a></p>
        <p>Created by Iman</p>
    </footer>
</body>
</html>
