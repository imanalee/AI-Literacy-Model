<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Literacy Model</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the AI Literacy Model</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Resources</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </header>

    <section>
        <h2>Welcome to the AI Literacy Model!</h2>
        <p>Helping schools learn AI with fun resources.</p>

        <h3>Find Learning Resources</h3>
        <form id="searchForm">
            <label for="gradeLevel">Grade Level:</label>
            <select id="gradeLevel">
                <option value="Primary">Primary</option>
                <option value="Middle">Middle</option>
                <option value="Secondary">Secondary</option>
                <option value="College">College</option>
            </select>

            <label for="subject">Subject:</label>
            <select id="subject">
                <option value="Math">Math</option>
                <option value="English">English</option>
                <option value="Computer Science">Computer Science</option>
            </select>

            <button type="button" id="searchButton">Search Resources</button>
        </form>

        <div id="resources"></div>
    </section>

    <footer>
        <p>&copy; 2024 AI Literacy Model. All Rights Reserved. | Made by Iman Alee Ghaznavi</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
